{{- if not .Values.secret.existingSecret }}
{{- $secretName := include "pocket-id.fullname" . }}
{{/*
  Preserve the encryption key across upgrades:
  1. Use the user-supplied value if set.
  2. Fall back to the key already stored in the live Secret (idempotent upgrades).
  3. Auto-generate a 32-character random key on the very first install.
*/}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $encryptionKey := .Values.secret.encryptionKey }}
{{- if not $encryptionKey }}
  {{- if and $existingSecret (index $existingSecret.data .Values.secret.encryptionKeyKey) }}
    {{- $encryptionKey = index $existingSecret.data .Values.secret.encryptionKeyKey | b64dec }}
  {{- else }}
    {{- $encryptionKey = randAlphaNum 32 }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "pocket-id.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.secret.encryptionKeyKey }}: {{ $encryptionKey | b64enc | quote }}
  {{- if .Values.config.smtp.enabled }}
  {{ .Values.secret.smtpPasswordKey }}: {{ .Values.secret.smtpPassword | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.ldap.enabled }}
  {{ .Values.secret.ldapBindPasswordKey }}: {{ .Values.secret.ldapBindPassword | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.s3.enabled }}
  {{ .Values.secret.s3SecretAccessKeyKey }}: {{ .Values.secret.s3SecretAccessKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.maxmind.enabled }}
  {{ .Values.secret.maxmindLicenseKeyKey }}: {{ .Values.secret.maxmindLicenseKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secret.staticApiKey }}
  {{ .Values.secret.staticApiKeyKey }}: {{ .Values.secret.staticApiKey | b64enc | quote }}
  {{- end }}
{{- end }}
