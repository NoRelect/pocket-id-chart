apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pocket-id.fullname" . }}
  labels:
    {{- include "pocket-id.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  strategy:
    type: {{ .Values.deploymentStrategy }}
  selector:
    matchLabels:
      {{- include "pocket-id.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "pocket-id.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "pocket-id.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "pocket-id.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: APP_URL
              value: {{ .Values.config.appUrl | quote }}
            - name: PORT
              value: {{ .Values.service.port | quote }}
            - name: HOST
              value: "0.0.0.0"
            - name: TRUST_PROXY
              value: {{ .Values.config.trustProxy | quote }}
            - name: ANALYTICS_DISABLED
              value: {{ .Values.config.analyticsDisabled | quote }}
            - name: VERSION_CHECK_DISABLED
              value: {{ .Values.config.versionCheckDisabled | quote }}
            - name: ALLOW_USER_SIGNUPS
              value: {{ .Values.config.allowUserSignups | quote }}
            - name: SESSION_DURATION
              value: {{ .Values.config.sessionDuration | quote }}
            - name: EMAILS_VERIFIED
              value: {{ .Values.config.emailsVerified | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            - name: LOG_JSON
              value: {{ .Values.config.logJson | quote }}
            - name: AUDIT_LOG_RETENTION_DAYS
              value: {{ .Values.config.auditLogRetentionDays | quote }}
            - name: DISABLE_RATE_LIMITING
              value: {{ .Values.config.disableRateLimiting | quote }}
            - name: APP_NAME
              value: {{ .Values.config.appName | quote }}
            - name: ACCENT_COLOR
              value: {{ .Values.config.accentColor | quote }}
            - name: DISABLE_ANIMATIONS
              value: {{ .Values.config.disableAnimations | quote }}
            - name: UI_CONFIG_DISABLED
              value: {{ .Values.config.uiConfigDisabled | quote }}
            - name: EMAIL_LOGIN_NOTIFICATION_ENABLED
              value: {{ .Values.config.emailLoginNotificationEnabled | quote }}
            - name: EMAIL_VERIFICATION_ENABLED
              value: {{ .Values.config.emailVerificationEnabled | quote }}
            - name: FILE_BACKEND
              {{- if .Values.config.s3.enabled }}
              value: "s3"
              {{- else }}
              value: {{ .Values.config.fileBackend | quote }}
              {{- end }}
            - name: TRACING_ENABLED
              value: {{ .Values.config.tracingEnabled | quote }}
            - name: METRICS_ENABLED
              value: {{ .Values.config.metricsEnabled | quote }}
            {{- if .Values.config.otelMetricsExporter }}
            - name: OTEL_METRICS_EXPORTER
              value: {{ .Values.config.otelMetricsExporter | quote }}
            - name: OTEL_EXPORTER_PROMETHEUS_HOST
              value: {{ .Values.config.prometheusHost | quote }}
            - name: OTEL_EXPORTER_PROMETHEUS_PORT
              value: {{ .Values.config.prometheusPort | quote }}
            {{- end }}
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "pocket-id.secretName" . }}
                  key: {{ .Values.secret.encryptionKeyKey }}
            - name: STATIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "pocket-id.secretName" . }}
                  key: {{ .Values.secret.staticApiKeyKey }}
                  optional: true
            {{- if .Values.config.smtp.enabled }}
            - name: SMTP_HOST
              value: {{ .Values.config.smtp.host | quote }}
            - name: SMTP_PORT
              value: {{ .Values.config.smtp.port | quote }}
            - name: SMTP_FROM
              value: {{ .Values.config.smtp.from | quote }}
            - name: SMTP_USER
              value: {{ .Values.config.smtp.user | quote }}
            - name: SMTP_TLS
              value: {{ .Values.config.smtp.tls | quote }}
            - name: SMTP_SKIP_CERT_VERIFY
              value: {{ .Values.config.smtp.skipCertVerify | quote }}
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pocket-id.secretName" . }}
                  key: {{ .Values.secret.smtpPasswordKey }}
                  optional: true
            {{- end }}
            {{- if .Values.config.ldap.enabled }}
            - name: LDAP_ENABLED
              value: "true"
            - name: LDAP_URL
              value: {{ .Values.config.ldap.url | quote }}
            - name: LDAP_BIND_DN
              value: {{ .Values.config.ldap.bindDn | quote }}
            - name: LDAP_BASE
              value: {{ .Values.config.ldap.base | quote }}
            - name: LDAP_SOFT_DELETE_USERS
              value: {{ .Values.config.ldap.softDeleteUsers | quote }}
            - name: LDAP_BIND_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pocket-id.secretName" . }}
                  key: {{ .Values.secret.ldapBindPasswordKey }}
                  optional: true
            {{- end }}
            {{- if .Values.config.s3.enabled }}
            - name: S3_BUCKET
              value: {{ .Values.config.s3.bucket | quote }}
            - name: S3_REGION
              value: {{ .Values.config.s3.region | quote }}
            - name: S3_ENDPOINT
              value: {{ .Values.config.s3.endpoint | quote }}
            - name: S3_ACCESS_KEY_ID
              value: {{ .Values.config.s3.accessKeyId | quote }}
            - name: S3_FORCE_PATH_STYLE
              value: {{ .Values.config.s3.forcePathStyle | quote }}
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "pocket-id.secretName" . }}
                  key: {{ .Values.secret.s3SecretAccessKeyKey }}
                  optional: true
            {{- end }}
            {{- if .Values.config.maxmind.enabled }}
            - name: MAXMIND_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "pocket-id.secretName" . }}
                  key: {{ .Values.secret.maxmindLicenseKeyKey }}
                  optional: true
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (include "pocket-id.fullname" .) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
