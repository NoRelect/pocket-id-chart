replicaCount: 1

# Recreate terminates the old pod before starting the new one, which is
# required because pocket-id uses a single-writer SQLite database on a PVC.
deploymentStrategy: Recreate

image:
  repository: ghcr.io/pocket-id/pocket-id
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""
  # Use the distroless variant: smaller attack surface, non-root by default.
  distroless: true

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  # Do not auto-mount the service account token
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000

service:
  type: ClusterIP
  port: 1411

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: pocket-id.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
    # - secretName: pocket-id-tls
    #   hosts:
    #     - pocket-id.example.com

httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
  - name: gateway
    sectionName: http
  hostnames:
  - pocket-id.example.com
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /

# Persistent storage for /app/data (database, uploads, GeoIP DB).
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi
  # Use an existing PVC instead of creating one.
  existingClaim: ""
  annotations: {}

config:
  # Full external URL where Pocket ID is accessible (required for OIDC redirects).
  appUrl: "http://localhost:1411"

  # Set to true when running behind a reverse proxy/ingress that terminates TLS.
  trustProxy: false

  # Disable the 24-hour heartbeat that reports instance count to pocket-id.org.
  analyticsDisabled: true
  # Disable outbound GitHub requests for version checks.
  versionCheckDisabled: true

  allowUserSignups: "disabled" # disabled | withToken | open
  # Session timeout in minutes.
  sessionDuration: 60
  emailsVerified: false

  logLevel: "info"
  logJson: false

  auditLogRetentionDays: 90

  disableRateLimiting: false

  uiConfigDisabled: false
  appName: "Pocket ID"
  accentColor: "default"
  disableAnimations: false

  emailLoginNotificationEnabled: false
  emailVerificationEnabled: false

  fileBackend: "filesystem"

  tracingEnabled: false
  metricsEnabled: false
  # Set to "prometheus" to expose a Prometheus scrape endpoint.
  otelMetricsExporter: ""
  # Host/port for the Prometheus metrics server (only used when metricsEnabled).
  prometheusHost: "0.0.0.0"
  prometheusPort: 9464

  smtp:
    enabled: false
    host: ""
    port: ""
    from: ""
    user: ""
    # none | starttls | tls
    tls: "none"
    skipCertVerify: false

  ldap:
    enabled: false
    url: ""
    bindDn: ""
    base: ""
    softDeleteUsers: false

  s3:
    enabled: false
    bucket: ""
    region: ""
    endpoint: ""
    accessKeyId: ""
    forcePathStyle: false

  maxmind:
    enabled: false

secret:
  existingSecret: ""

  encryptionKey: ""
  encryptionKeyKey: "encryption-key"

  smtpPassword: ""
  smtpPasswordKey: "smtp-password"

  ldapBindPassword: ""
  ldapBindPasswordKey: "ldap-bind-password"

  s3SecretAccessKey: ""
  s3SecretAccessKeyKey: "s3-secret-access-key"

  # Static API key that grants admin API access. Leave empty to disable.
  staticApiKey: ""
  staticApiKeyKey: "static-api-key"

  maxmindLicenseKey: ""
  maxmindLicenseKeyKey: "maxmind-license-key"

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 256Mi

livenessProbe:
  exec:
    command:
      - /app/pocket-id
      - healthcheck
  initialDelaySeconds: 10
  periodSeconds: 90
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  exec:
    command:
      - /app/pocket-id
      - healthcheck
  initialDelaySeconds: 5
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# Additional environment variables injected verbatim into the container.
extraEnv: []
  # - name: MY_VAR
  #   value: "my-value"

# Additional envFrom sources (ConfigMaps, Secrets).
extraEnvFrom: []
  # - secretRef:
  #     name: my-secret

# Additional volumes / volumeMounts (appended to the chart-managed ones).
volumes: []
volumeMounts: []
